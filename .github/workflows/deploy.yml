name: Deploy to Simply

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: web

      - name: Build static site
        run: npm run build
        working-directory: web

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SIMPLY_SSH_PRIVATE_KEY }}" > ~/.ssh/simply_deploy_key
          chmod 600 ~/.ssh/simply_deploy_key

      - name: Deploy to Simply via SSH
        env:
          SIMPLY_SSH_HOST: ${{ secrets.SIMPLY_SSH_HOST }}
          SIMPLY_SSH_USERNAME: ${{ secrets.SIMPLY_SSH_USERNAME }}
          SIMPLY_SSH_PASSWORD: ${{ secrets.SIMPLY_SSH_PASSWORD }}
        run: |
          sshpass -p "$SIMPLY_SSH_PASSWORD" rsync -avz --delete \
            -e "ssh -i ~/.ssh/simply_deploy_key -o StrictHostKeyChecking=no" \
            web/out/ \
            "$SIMPLY_SSH_USERNAME@$SIMPLY_SSH_HOST:public_html/"
