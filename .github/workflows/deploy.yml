name: Deploy to Simply

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: web

      - name: Build static site
        run: npm run build
        working-directory: web

      - name: Deploy to Simply via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SIMPLY_FTP_SERVER }}
          username: ${{ secrets.SIMPLY_FTP_USERNAME }}
          password: ${{ secrets.SIMPLY_FTP_PASSWORD }}
          protocol: ftps
          port: 21
          security: loose
          timeout: 60000
          local-dir: web/out/
          server-dir: /public_html/
